<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daylens — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #051425;
      color: #d5e3fc;
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #b4c5ff;
    }
    p {
      font-size: 0.875rem;
      color: #8b9bb5;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're offline</h1>
    <p>Open Daylens on your computer to sync. Data will appear here once you're back online.</p>
  </div>
</body>
</html>
